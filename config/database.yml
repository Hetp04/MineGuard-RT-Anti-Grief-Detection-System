default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USER", ENV["USER"]) %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>

development:
  <<: *default
  database: mineguard_development

test:
  <<: *default
  database: mineguard_test

production:
  <<: *default
  database: mineguard_production
  username: mineguard
  password: <%= ENV["MINEGUARD_DATABASE_PASSWORD"] %>
